variables:
  PLACEHOLDER_VERSION: v0.0.1dev
  DOMAIN_ADMIN_EMAIL: it-admin@hololinked.dev

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        DEPLOYMENT_ENV: prod
        NAMESPACE: apps
        KUBECONFIG_BASE64: $KUBECONFIG_B64_PROD
        DOMAIN_NAME: "hololinked.io"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        DEPLOYMENT_ENV: staging
        NAMESPACE: staging
        KUBECONFIG_BASE64: $KUBECONFIG_B64_TEST
        DOMAIN_NAME: "hololinked.net"
    - if: $CI_COMMIT_BRANCH
      variables:
        DEPLOYMENT_ENV: dev
        NAMESPACE: $CI_COMMIT_REF_SLUG
        KUBECONFIG_BASE64: $KUBECONFIG_B64_TEST
        DOMAIN_NAME: "hololinked.net"

stages:
  - prepare
  - codestyle
  - security
  - test
  - release
  - build
  - deploy
  - rollback
  - undeploy

ops-job-runner:build:
  stage: prepare
  image: docker:latest
  needs: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CI_REGISTRY_IMAGE/ops-job-runner:$CI_PIPELINE_ID -f ci-cd/ops.job-runner.Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/ops-job-runner:$CI_PIPELINE_ID

dev-job-runner:build:
  stage: prepare
  image: docker:latest
  needs: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CI_REGISTRY_IMAGE/dev-job-runner:$CI_PIPELINE_ID -f ci-cd/dev.job-runner.Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/dev-job-runner:$CI_PIPELINE_ID

#############
# codestyle #
#############

.codestyle:template:
  stage: codestyle
  image: $CI_REGISTRY_IMAGE/dev-job-runner:$CI_PIPELINE_ID
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  needs:
    - dev-job-runner:build
  script:
    - echo "base codestyle job template"

############
# security #
############

.security:template:
  stage: security
  image: $CI_REGISTRY_IMAGE/dev-job-runner:$CI_PIPELINE_ID
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  needs:
    - dev-job-runner:build
  script:
    - echo "base security job template"

.security:gitleaks:template:
  extends: .security:template
  image: $CI_REGISTRY_IMAGE/dev-job-runner:$CI_PIPELINE_ID
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  variables:
    MODULE_PATH: ""
  script:
    - echo "Running gitleaks secret scan..."
    - gitleaks detect --source $MODULE_PATH --no-git --report-path gitleaks-report.json --verbose --log-level trace
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 30 days

###########
# Release #
###########

# Triggered manually via the GitLab UI "Run pipeline" button.
# Required variables:
#   SEMANTIC_RELEASE = "true"
#   RELEASE_TYPE     = "major" | "minor" | "patch"
semantic-release:
  stage: release
  image: $CI_REGISTRY_IMAGE/dev-job-runner:$CI_PIPELINE_ID
  needs:
    - dev-job-runner:build
  variables:
    GITLAB_TOKEN: $SEMANTIC_RELEASE_TOKEN
    RELEASE_TYPE: "patch"
    SEMANTIC_RELEASE: "false" # flag to trigger manually
  before_script:
    - |
      if [ "$RELEASE_TYPE" != "major" ] && [ "$RELEASE_TYPE" != "minor" ] && [ "$RELEASE_TYPE" != "patch" ]; then
        echo "ERROR: RELEASE_TYPE must be one of: major, minor, patch. Got: '$RELEASE_TYPE'"
        exit 1
      fi
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" == "web" ] && [ "$SEMANTIC_RELEASE" == "true" ] && [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
        semantic-release
      else
        echo "Skipping semantic-release. To trigger a release, run a pipeline manually from the default branch in GitLab UI and set SEMANTIC_RELEASE=true and RELEASE_TYPE to major, minor, or patch."
      fi
    - |
      # Resolve VERSION and write version.env for downstream build jobs
      if [ -f version.env ]; then
        source version.env
      elif [ -n "$CI_COMMIT_TAG" ]; then
        VERSION=$CI_COMMIT_TAG
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        VERSION="main.dev$CI_COMMIT_SHORT_SHA"
      elif [ -n "$CI_COMMIT_BRANCH" ]; then
        VERSION="${CI_COMMIT_REF_SLUG:0:45}.dev$CI_COMMIT_SHORT_SHA"
      else
        VERSION=$PLACEHOLDER_VERSION
      fi
      # overwrite
      echo "VERSION=$VERSION" > version.env
  after_script:
    - source version.env && echo "Determined version - $VERSION"
  artifacts:
    reports:
      dotenv: version.env
    expire_in: 1 day

###########
# Imports #
###########

include:
  - local: frontend/.gitlab-ci.yml
  - local: backend/.gitlab-ci.yml
  - local: deployment/.gitlab-ci.yml

#################
# ops templates #
#################

.create-skaffold-dotenv: &create-skaffold-dotenv |
  cat <<EOF >> skaffold.env
  SKAFFOLD_DEFAULT_REPO=$CI_REGISTRY_IMAGE
  VERSION=$VERSION
  NAMESPACE=$NAMESPACE
  DOMAIN_NAME=$DOMAIN_NAME
  DOMAIN_ADMIN_EMAIL=$DOMAIN_ADMIN_EMAIL
  EOF

.export-kubeconfig: &export-kubeconfig |
  echo "$KUBECONFIG_BASE64" | base64 -d > kubeconfig.yaml
  export KUBECONFIG="$PWD/kubeconfig.yaml"
  kubectl config current-context

.docker-login: &docker-login |
  echo $CI_REGISTRY_PASSWORD | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

.update-helm-app-version: &update-helm-app-version |
  for chart in deployment/helm/*/Chart.yaml; do
    if [ -f "$chart" ]; then
      sed -i "s|^appVersion:.*|appVersion: \"$VERSION\"|" "$chart"
    fi
  done

#########
# Build #
#########

.build.template:
  stage: build
  image: $CI_REGISTRY_IMAGE/ops-job-runner:$CI_PIPELINE_ID
  variables:
    MODULE: ""
  needs:
    - semantic-release
    - dev-job-runner:build
  dependencies:
    - semantic-release
    - dev-job-runner:build
  before_script:
    - *docker-login
    - *export-kubeconfig
    - *create-skaffold-dotenv
  script:
    - skaffold build --file-output skaffold-deploy-$MODULE.json -p $DEPLOYMENT_ENV -m $MODULE
  artifacts:
    paths:
      - skaffold-deploy-*.json
    expire_in: 3 days

frontend:build:
  extends: .build.template
  variables:
    MODULE: frontend

backend:build:
  extends: .build.template
  variables:
    MODULE: backend

documentation:build:
  extends: .build.template
  variables:
    MODULE: documentation

##########
# Deploy #
##########

.deploy.template:
  stage: deploy
  image: $CI_REGISTRY_IMAGE/ops-job-runner:$CI_PIPELINE_ID
  when: manual
  allow_failure: true
  variables:
    MODULE: ""
  needs:
    - semantic-release
    - ops-job-runner:build
  dependencies:
    - semantic-release
    - ops-job-runner:build
  before_script:
    - *export-kubeconfig
    - *create-skaffold-dotenv
    - *update-helm-app-version
  script:
    - |
      if [ -f "skaffold-deploy-$MODULE.json" ]; then
        skaffold deploy -a skaffold-deploy-$MODULE.json -m $MODULE -p $DEPLOYMENT_ENV
      else
        skaffold deploy -m $MODULE -p $DEPLOYMENT_ENV
      fi

1-namespace:deploy:
  extends: .deploy.template
  script:
    - kubectl create namespace $NAMESPACE || echo "Namespace $NAMESPACE already exists"

2-cert-issuer:deploy:
  extends: .deploy.template
  variables:
    MODULE: cert-issuer

3-gateway:deploy:
  extends: .deploy.template
  variables:
    MODULE: gateway

frontend:deploy:
  extends: .deploy.template
  needs:
    - semantic-release
    - frontend:build
  dependencies:
    - semantic-release
    - frontend:build
  variables:
    MODULE: frontend

backend:deploy:
  extends: .deploy.template
  needs:
    - semantic-release
    - backend:build
  dependencies:
    - semantic-release
    - backend:build
  variables:
    MODULE: backend

documentation:deploy:
  extends: .deploy.template
  needs:
    - semantic-release
    - documentation:build
  dependencies:
    - semantic-release
    - documentation:build
  variables:
    MODULE: documentation

############
# Rollback #
############

.rollback.template:
  stage: rollback
  image: $CI_REGISTRY_IMAGE/ops-job-runner:$CI_PIPELINE_ID
  when: manual
  allow_failure: true
  variables:
    RELEASE_NAME: ""
  before_script:
    - *export-kubeconfig
  script:
    - helm rollback $RELEASE_NAME -n $NAMESPACE

1-cert-issuer:rollback:
  extends: .rollback.template
  needs:
    - 2-cert-issuer:deploy
  variables:
    RELEASE_NAME: cert-issuer

3-gateway:rollback:
  extends: .rollback.template
  needs:
    - 3-gateway:deploy
  variables:
    RELEASE_NAME: gateway

frontend:rollback:
  extends: .rollback.template
  needs:
    - frontend:deploy
  variables:
    RELEASE_NAME: frontend

backend:rollback:
  extends: .rollback.template
  needs:
    - backend:deploy
  variables:
    RELEASE_NAME: backend

documentation:rollback:
  extends: .rollback.template
  needs:
    - documentation:deploy
  variables:
    RELEASE_NAME: documentation

############
# Undeploy #
############

.undeploy:template:
  stage: undeploy
  image: $CI_REGISTRY_IMAGE/ops-job-runner:$CI_PIPELINE_ID
  when: manual
  allow_failure: true
  variables:
    MODULE: ""
  before_script:
    - *export-kubeconfig
    - *create-skaffold-dotenv
  script:
    - skaffold delete -m $MODULE -p $DEPLOYMENT_ENV

1-namespace:undeploy:
  extends: .undeploy:template
  script:
    - skaffold delete -m frontend -p $DEPLOYMENT_ENV
    - skaffold delete -m backend -p $DEPLOYMENT_ENV
    - kubectl delete all --all -n $NAMESPACE
    - kubectl delete namespace $NAMESPACE

2-cert-issuer:undeploy:
  extends: .undeploy:template
  variables:
    MODULE: cert-issuer

3-gateway:undeploy:
  extends: .undeploy:template
  variables:
    MODULE: gateway

frontend:undeploy:
  extends: .undeploy:template
  variables:
    MODULE: frontend

backend:undeploy:
  extends: .undeploy:template
  variables:
    MODULE: backend

documentation:undeploy:
  extends: .undeploy:template
  variables:
    MODULE: documentation
