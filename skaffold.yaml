apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: cert-issuer
deploy:
  helm:
    releases:
      - name: cert-issuer
        chartPath: deployment/helm/cert-issuer
        namespace: "{{ .NAMESPACE }}"
        createNamespace: true
        wait: true
        setValueTemplates:
          environment: "{{ .DEPLOYMENT_ENV }}"
          email: "{{ .DOMAIN_ADMIN_EMAIL }}"
        valuesFiles:
          - deployment/helm/cert-issuer/values.yaml

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: gateway
deploy:
  helm:
    releases:
      - name: "{{ .NAMESPACE }}-namespace-gateway"
        chartPath: deployment/helm/gateway
        namespace: "{{ .NAMESPACE }}"
        createNamespace: true
        wait: true
        valuesFiles:
          - deployment/helm/gateway/values.yaml
        setValues:
          nameOverride: gateway # should match the routes below
        setValueTemplates:
          environment: "{{ .DEPLOYMENT_ENV }}"
          cert.environment: "{{ .DEPLOYMENT_ENV }}"
          hostnames:
            tld: "{{ .DOMAIN_NAME }}"
            auth: "auth.{{ .DOMAIN_NAME }}"
---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: frontend
build:
  artifacts:
    - image: frontend
      context: .
      docker:
        dockerfile: frontend/Dockerfile
        target: dev
      sync:
        manual:
          - src: "frontend/src/**/*"
            dest: /app
  tagPolicy:
    envTemplate:
      template: "{{ or .VERSION .NAMESPACE }}"
  local:
    push: true
deploy:
  helm:
    releases:
      - name: frontend
        chartPath: deployment/helm/frontend
        namespace: "{{ or .NAMESPACE default }}"
        createNamespace: true
        setValues:
          nameOverride: frontend
          image.ports.containerPort: 5173
        setValueTemplates:
          image.repository: "{{ .IMAGE_REPO_frontend }}"
          image.tag: "{{ .IMAGE_TAG_frontend }}@{{ .IMAGE_DIGEST_frontend }}"
profiles:
  - name: prod
    patches:
      - op: replace
        path: /build/artifacts/0/docker/target
        value: prod
      - op: replace
        path: /deploy/helm/releases/0/setValues/image.ports.containerPort
        value: 80
  - name: staging
    patches:
      - op: replace
        path: /build/artifacts/0/docker/target
        value: staging
      - op: replace
        path: /deploy/helm/releases/0/setValues/image.ports.containerPort
        value: 80
  - name: dev

---
